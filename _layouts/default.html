<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATAA - {{ page.title }}</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ataaStyles.css" />
  {% if page.ogImage %}
  <meta property="og:image" content="{{ page.ogImage }}">
  {% endif %}
  {% if page.ogTitle %}
  <meta property="og:title" content="{{ page.ogTitle }}">
  {% endif %}
  {% if page.ogUrl %}
  <meta property="og:url" content="{{ page.ogUrl }}">
  <meta property="og:type" content="website">
  {% endif %}
  {% if page.ogDescription %}
  <meta property="og:description" content="{{ page.ogDescription }}">
  {% endif %}
</head>

<body>
  {% include navbar.html %}
  {{ content }}
  {% include footer.html %}
</body>

</html>
